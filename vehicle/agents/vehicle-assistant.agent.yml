    action: Check mileage against upcoming service intervals and flag any due maintenance
    interval: weekly
  - trigger: schedule
    action: Review fuel expenses and driving patterns for efficiency suggestions
    interval: monthly
  - trigger: schedule
    action: Check for manufacturer recalls, review insurance policy renewal dates, and verify registration status
    interval: quarterly
